name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build with PyInstaller
        run: uv run python -m PyInstaller --noconfirm --clean --onedir --windowed --name FH6Automation --add-data "src/templates;templates" --paths src src/main.py

      - name: Build installer
        run: iscc installer.iss

      - name: Extract changelog for this version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $content = [System.IO.File]::ReadAllText("CHANGELOG.md", [System.Text.Encoding]::UTF8)
          if ($content -match "(?ms)^## v$([regex]::Escape($tag))\s*\r?\n(.+?)(?=\r?\n## |\z)") {
            [System.IO.File]::WriteAllText("RELEASE_BODY.md", $Matches[1].Trim(), [System.Text.Encoding]::UTF8)
          } else {
            [System.IO.File]::WriteAllText("RELEASE_BODY.md", "", [System.Text.Encoding]::UTF8)
          }

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v3
        with:
          files: Output/FH6Automation_Setup.exe
          body_path: RELEASE_BODY.md
